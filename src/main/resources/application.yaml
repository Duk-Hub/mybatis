spring:
  application:
    name: orm

  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.orm.mybatis.entity
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'